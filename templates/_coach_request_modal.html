<div id="coach-request-modal" onclick="if(event.target===this)closeCoachRequestModal()" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.6); z-index:2000; align-items:center; justify-content:center;">
  <div style="background:#fff; border-radius:14px; padding:28px; max-width:480px; width:90%; max-height:90vh; overflow-y:auto;">
    <div style="display:flex; justify-content:space-between; align-items:start; margin-bottom:12px;">
      <h2 style="margin:0; color:#0a1628; font-size:20px;">Request Coach Access</h2>
      <button onclick="closeCoachRequestModal()" style="background:none; border:none; font-size:24px; color:#9ca3af; cursor:pointer; line-height:1;">×</button>
    </div>
    <p style="color:#6b7280; font-size:13px; margin:0 0 18px 0;">Fill out your details below. We'll email you a signup link right away and notify our admins of your request.</p>

    <div id="cr-success" style="display:none; background:#dcfce7; border:1.5px solid #86efac; border-radius:10px; padding:14px 16px; margin-bottom:16px; font-size:13px; color:#166534; font-weight:600;">
      ✅ Request submitted. Check your email for your signup link (valid for 7 days).
    </div>
    <div id="cr-error" style="display:none; background:#fee2e2; border:1.5px solid #fca5a5; border-radius:10px; padding:14px 16px; margin-bottom:16px; font-size:13px; color:#991b1b; font-weight:600;"></div>

    <div id="cr-form">
      <div class="form-group" style="margin-bottom:12px;">
        <label style="font-size:12px; font-weight:700; color:#6b7280; text-transform:uppercase;">Email</label>
        <input type="email" id="cr-email" placeholder="coach@school.edu" style="width:100%; padding:10px; border:1.5px solid #e5e7eb; border-radius:8px; box-sizing:border-box; margin-top:4px;">
      </div>
      <div class="form-group" style="margin-bottom:20px; position:relative;">
        <label style="font-size:12px; font-weight:700; color:#6b7280; text-transform:uppercase;">School</label>
        <input type="text" id="cr-school-search" placeholder="Start typing your school…" autocomplete="off" style="width:100%; padding:10px; border:1.5px solid #e5e7eb; border-radius:8px; box-sizing:border-box; margin-top:4px;">
        <input type="hidden" id="cr-college" value="">
        <input type="hidden" id="cr-division" value="">
        <input type="hidden" id="cr-conference" value="">
        <div id="cr-school-results" style="display:none; position:absolute; left:0; right:0; top:100%; background:#fff; border:1.5px solid #0a1628; border-top:none; border-radius:0 0 10px 10px; max-height:240px; overflow-y:auto; z-index:10; box-shadow:0 8px 24px rgba(0,0,0,.12);"></div>
      </div>
      <div style="display:flex; gap:10px;">
        <button type="button" onclick="closeCoachRequestModal()" style="flex:1; padding:12px; background:#f3f4f6; border:none; border-radius:8px; cursor:pointer; font-weight:600;">Cancel</button>
        <button type="button" onclick="submitCoachRequest()" id="cr-submit" style="flex:1; padding:12px; background:#0a1628; color:#fff; border:none; border-radius:8px; cursor:pointer; font-weight:700;">Submit Request</button>
      </div>
    </div>
  </div>
</div>

<script>
function openCoachRequestModal() {
  document.getElementById('coach-request-modal').style.display = 'flex';
  document.getElementById('cr-success').style.display = 'none';
  document.getElementById('cr-error').style.display = 'none';
  document.getElementById('cr-form').style.display = '';
  var s = document.getElementById('cr-school-search');
  if (s) s.value = '';
  document.getElementById('cr-college').value = '';
  document.getElementById('cr-division').value = '';
  document.getElementById('cr-conference').value = '';
  var box = document.getElementById('cr-school-results');
  if (box) box.style.display = 'none';
}
function closeCoachRequestModal() {
  document.getElementById('coach-request-modal').style.display = 'none';
}
var _crAllSchools = (function() {
  var out = [];
  if (!window.COLLEGE_DATA) return out;
  Object.keys(window.COLLEGE_DATA).forEach(function(div) {
    Object.keys(window.COLLEGE_DATA[div]).forEach(function(conf) {
      window.COLLEGE_DATA[div][conf].forEach(function(name) {
        out.push({name: name, division: div, conference: conf, search: name.toLowerCase()});
      });
    });
  });
  out.sort(function(a, b) { return a.name.localeCompare(b.name); });
  return out;
})();

function _crSelectSchool(s) {
  document.getElementById('cr-school-search').value = s.name + ' (' + s.division + ' — ' + s.conference + ')';
  document.getElementById('cr-college').value = s.name;
  document.getElementById('cr-division').value = s.division;
  document.getElementById('cr-conference').value = s.conference;
  document.getElementById('cr-school-results').style.display = 'none';
}

(function() {
  var input = document.getElementById('cr-school-search');
  var box = document.getElementById('cr-school-results');
  if (!input || !box) return;
  input.addEventListener('input', function() {
    var q = this.value.toLowerCase().trim();
    document.getElementById('cr-college').value = '';
    document.getElementById('cr-division').value = '';
    document.getElementById('cr-conference').value = '';
    if (q.length < 2) { box.style.display = 'none'; return; }
    var matches = _crAllSchools.filter(function(s) { return s.search.indexOf(q) !== -1; }).slice(0, 20);
    if (!matches.length) {
      box.innerHTML = '<div style="padding:12px; color:#9ca3af; font-size:13px;">No matches. Try a different spelling.</div>';
      box.style.display = 'block';
      return;
    }
    box.innerHTML = '';
    matches.forEach(function(s) {
      var row = document.createElement('div');
      row.style.cssText = 'padding:10px 14px; cursor:pointer; border-bottom:1px solid #f3f4f6; font-size:14px;';
      row.innerHTML = '<strong style="color:#0a1628;">' + s.name + '</strong><span style="color:#6b7280; font-size:12px; margin-left:8px;">' + s.division + ' — ' + s.conference + '</span>';
      row.addEventListener('mousedown', function(e) { e.preventDefault(); _crSelectSchool(s); });
      box.appendChild(row);
    });
    box.style.display = 'block';
  });
  input.addEventListener('blur', function() { setTimeout(function() { box.style.display = 'none'; }, 200); });
  input.addEventListener('focus', function() { if (this.value.length >= 2) this.dispatchEvent(new Event('input')); });
})();
function submitCoachRequest() {
  var email = document.getElementById('cr-email').value.trim();
  var div = document.getElementById('cr-division').value;
  var conf = document.getElementById('cr-conference').value;
  var school = document.getElementById('cr-college').value;
  var err = document.getElementById('cr-error');
  err.style.display = 'none';
  if (!email) { err.textContent = 'Please enter an email address.'; err.style.display = ''; return; }
  if (!school) { err.textContent = 'Please search for and select your school.'; err.style.display = ''; return; }
  var btn = document.getElementById('cr-submit'); btn.disabled = true; btn.textContent = 'Submitting...';
  fetch('/coach-request', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({email: email, division: div, conference: conf, school: school})
  }).then(function(r) { return r.json().then(function(j) { return {status: r.status, json: j}; }); })
    .then(function(res) {
      btn.disabled = false; btn.textContent = 'Submit Request';
      if (res.status === 200 && res.json.ok) {
        document.getElementById('cr-form').style.display = 'none';
        document.getElementById('cr-success').style.display = '';
      } else {
        err.textContent = res.json.error || 'Something went wrong. Please try again.';
        err.style.display = '';
      }
    }).catch(function() {
      btn.disabled = false; btn.textContent = 'Submit Request';
      err.textContent = 'Network error. Please try again.';
      err.style.display = '';
    });
}
</script>
